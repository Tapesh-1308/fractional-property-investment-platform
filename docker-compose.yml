services:
  postgres:
    image: postgres:15-alpine
    container_name: fractional-postgres
    environment:
      POSTGRES_DB: ${PG_DATABASE}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
      - ./scripts/seed-data.sql:/docker-entrypoint-initdb.d/seed-data.sql
    networks:
      - fractional-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: fractional-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - fractional-network
    restart: unless-stopped
    depends_on:
      - postgres

  api-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fractional-property-investment-app
    env_file:
      - .env
    environment:
      PG_HOST: postgres
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./logs:/app/logs
    networks:
      - fractional-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  pgadmin_data:

networks:
  fractional-network:
    driver: bridge